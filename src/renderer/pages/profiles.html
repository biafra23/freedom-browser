<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:;"
    />
    <title>Profiles</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjOGI5NDllIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHBhdGggZD0iTTIwIDIxYTggOCAwIDAgMC0xNiAwIi8+PGNpcmNsZSBjeD0iMTIiIGN5PSI3IiByPSI0Ii8+PC9zdmc+"
    />
    <style>
      :root {
        --bg: #0d1117;
        --bg-elev: #161b22;
        --bg-card: #21262d;
        --border: #30363d;
        --border-strong: #484f58;
        --text: #c9d1d9;
        --text-muted: #8b949e;
        --text-subtle: #6e7681;
        --accent: #58a6ff;
        --accent-muted: rgba(88, 166, 255, 0.12);
        --danger: #f85149;
        --success: #3fb950;
        --warn: #d29922;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family:
          'IBM Plex Sans',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #21262d 100%);
        color: var(--text);
        min-height: 100vh;
      }

      .page {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 32px 80px;
      }

      .page-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      .page-title {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0;
        font-size: 22px;
        font-weight: 600;
        color: var(--text);
      }

      .page-title svg {
        color: var(--accent);
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }

      .btn {
        padding: 8px 14px;
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
        transition:
          border-color 0.1s,
          background 0.1s;
      }

      .btn:hover:not(:disabled) {
        border-color: var(--border-strong);
        background: var(--bg-card);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #0d1117;
        font-weight: 600;
      }

      .btn.primary:hover:not(:disabled) {
        background: #79b8ff;
        border-color: #79b8ff;
      }

      .btn.danger {
        border-color: rgba(248, 81, 73, 0.45);
        color: var(--danger);
      }

      .btn.danger:hover:not(:disabled) {
        border-color: var(--danger);
      }

      .rpc-input {
        flex: 1;
        min-width: 0;
        padding: 8px 12px;
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
        font-size: 13px;
        outline: none;
        transition: border-color 0.1s;
      }

      .rpc-input:focus {
        border-color: var(--accent);
      }

      .rpc-input::placeholder {
        color: var(--text-subtle);
      }

      .rpc-status {
        font-size: 12px;
        margin-top: 12px;
        min-height: 16px;
      }

      .rpc-status.success {
        color: var(--success);
      }

      .rpc-status.error {
        color: var(--danger);
      }

      .rpc-status.testing {
        color: var(--warn);
      }

      .profile-pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 9px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg-elev);
        color: var(--text-muted);
        font-size: 12px;
        line-height: 1;
      }

      .profile-manager-list {
        display: flex;
        flex-direction: column;
      }

      .profile-manager-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
      }

      .profile-manager-row:last-child {
        border-bottom: 0;
      }

      .profile-manager-main {
        min-width: 0;
      }

      .profile-manager-name {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .profile-manager-name input {
        max-width: 280px;
      }

      .profile-manager-actions {
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }

      .profile-manager-empty {
        padding: 18px;
        color: var(--text-muted);
        font-size: 13px;
      }

      .profile-delete-confirm {
        grid-column: 1 / -1;
        margin-top: 4px;
        padding: 14px;
        border: 1px solid rgba(248, 81, 73, 0.35);
        border-radius: 8px;
        background: rgba(248, 81, 73, 0.08);
      }

      .profile-delete-confirm[hidden] {
        display: none;
      }

      .profile-delete-copy {
        margin: 0 0 10px;
        color: var(--text);
        font-size: 12px;
        line-height: 1.45;
      }

      .profile-delete-controls {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 8px;
      }

      /* Light theme */
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #ffffff;
          --bg-elev: #ffffff;
          --bg-card: #ffffff;
          --border: #d0d7de;
          --border-strong: #8c959f;
          --text: #24292f;
          --text-muted: #57606a;
          --text-subtle: #8c959f;
          --accent: #0969da;
          --accent-muted: rgba(9, 105, 218, 0.1);
          --danger: #cf222e;
          --success: #1a7f37;
          --warn: #9a6700;
        }

        body {
          background: linear-gradient(135deg, #ffffff 0%, #f6f8fa 50%, #f0f2f5 100%);
        }

        .btn.primary {
          color: #ffffff;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="page-head">
        <h1 class="page-title">
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21a8 8 0 0 0-16 0"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          Profiles
        </h1>
        <button type="button" class="btn primary" id="create-profile-btn">Create Profile</button>
      </div>
      <div class="card">
        <div class="profile-manager-list" id="profile-manager-list">
          <div class="profile-manager-empty">Loading…</div>
        </div>
      </div>
      <p id="profile-manager-status" class="rpc-status"></p>
    </main>

    <script>
      const managerList = document.getElementById('profile-manager-list');
      const managerStatus = document.getElementById('profile-manager-status');
      const createBtn = document.getElementById('create-profile-btn');

      const esc = (s) =>
        String(s == null ? '' : s).replace(
          /[&<>"]/g,
          (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]
        );

      const setStatus = (message, kind) => {
        if (!managerStatus) return;
        managerStatus.textContent = message || '';
        managerStatus.className = 'rpc-status' + (kind ? ' ' + kind : '');
      };

      const renderProfiles = (profiles) => {
        if (!managerList) return;
        if (!profiles?.length) {
          managerList.innerHTML = '<div class="profile-manager-empty">No profiles found</div>';
          return;
        }

        managerList.innerHTML = profiles
          .map((profile) => {
            const isUnregistered = profile.isUnregistered === true;
            const canDelete = !profile.isActive && profile.id !== 'default';
            const displayName = profile.displayName || profile.id;
            const badge = profile.isActive
              ? '<span class="profile-pill">Current</span>'
              : isUnregistered
                ? '<span class="profile-pill">Unregistered</span>'
                : '';
            const actions = isUnregistered
              ? `<button type="button" class="btn" data-import-profile>Register</button>`
              : `
              <button type="button" class="btn" data-open-profile ${profile.isActive ? 'disabled' : ''}>Open</button>
              <button type="button" class="btn" data-rename-profile>Rename</button>
              <button type="button" class="btn danger" data-delete-profile ${canDelete ? '' : 'disabled'}>Delete</button>
            `;
            return `
          <div class="profile-manager-row" data-profile-id="${esc(profile.id)}" data-profile-display-name="${esc(displayName)}">
            <div class="profile-manager-main">
              <div class="profile-manager-name">
                <input
                  type="text"
                  class="rpc-input"
                  data-profile-name-input
                  value="${esc(displayName)}"
                  spellcheck="false"
                  ${isUnregistered ? 'disabled' : ''}
                />
                ${badge}
              </div>
            </div>
            <div class="profile-manager-actions">${actions}</div>
            <div class="profile-delete-confirm" data-delete-confirm hidden>
              <p class="profile-delete-copy">
                Deleting this profile removes its vault data, browser data, node data, RPC keys,
                local settings, and any local value-bearing node state. Type
                <strong>${esc(displayName)}</strong> to confirm.
              </p>
              <div class="profile-delete-controls">
                <input
                  type="text"
                  class="rpc-input"
                  data-delete-confirm-input
                  placeholder="${esc(displayName)}"
                  spellcheck="false"
                />
                <button type="button" class="btn danger" data-confirm-delete-profile>Delete profile</button>
                <button type="button" class="btn" data-cancel-delete-profile>Cancel</button>
              </div>
            </div>
          </div>`;
          })
          .join('');
      };

      const refreshProfiles = async () => {
        if (!managerList) return;
        try {
          const result = await freedomAPI.listProfiles?.();
          if (!result?.success) {
            throw new Error(result?.error?.message || 'Profiles unavailable');
          }
          renderProfiles(result.profiles || []);
        } catch (err) {
          managerList.innerHTML =
            '<div class="profile-manager-empty">Profile list unavailable</div>';
          setStatus(err?.message || 'Profile list unavailable', 'error');
        }
      };

      createBtn?.addEventListener('click', () => {
        // Opens the shared chrome create-modal over this page's owning window.
        freedomAPI.requestCreateProfileModal?.();
      });

      managerList?.addEventListener('click', async (event) => {
        const importButton = event.target?.closest?.('[data-import-profile]');
        if (importButton) {
          const profileId = importButton.closest('[data-profile-id]')?.dataset.profileId;
          if (!profileId) return;
          importButton.disabled = true;
          setStatus('Registering profile…', 'testing');
          try {
            const result = await freedomAPI.importProfile?.(profileId);
            if (!result?.success) {
              throw new Error(result?.error?.message || 'Profile could not be registered');
            }
            setStatus('Profile registered. You can open it now.', 'success');
            await refreshProfiles();
          } catch (err) {
            setStatus(err?.message || 'Profile could not be registered', 'error');
            importButton.disabled = false;
          }
          return;
        }

        const deleteButton = event.target?.closest?.('[data-delete-profile]');
        if (deleteButton) {
          const row = deleteButton.closest('[data-profile-id]');
          row?.querySelector('[data-delete-confirm]')?.removeAttribute('hidden');
          row?.querySelector('[data-delete-confirm-input]')?.focus();
          setStatus('', '');
          return;
        }

        const cancelDeleteButton = event.target?.closest?.('[data-cancel-delete-profile]');
        if (cancelDeleteButton) {
          const row = cancelDeleteButton.closest('[data-profile-id]');
          row?.querySelector('[data-delete-confirm]')?.setAttribute('hidden', '');
          const input = row?.querySelector('[data-delete-confirm-input]');
          if (input) input.value = '';
          return;
        }

        const confirmDeleteButton = event.target?.closest?.('[data-confirm-delete-profile]');
        if (confirmDeleteButton) {
          const row = confirmDeleteButton.closest('[data-profile-id]');
          const profileId = row?.dataset.profileId;
          const displayName = row?.dataset.profileDisplayName;
          const confirmation = row?.querySelector('[data-delete-confirm-input]')?.value || '';
          if (!profileId || !displayName) return;
          if (confirmation !== displayName) {
            setStatus('Profile name confirmation did not match.', 'error');
            return;
          }
          confirmDeleteButton.disabled = true;
          setStatus('Deleting profile…', 'testing');
          try {
            const result = await freedomAPI.deleteProfile?.(profileId, confirmation);
            if (!result?.success) {
              throw new Error(result?.error?.message || 'Profile could not be deleted');
            }
            setStatus('Profile deleted.', 'success');
            await refreshProfiles();
          } catch (err) {
            setStatus(err?.message || 'Profile could not be deleted', 'error');
            confirmDeleteButton.disabled = false;
          }
          return;
        }

        const openButton = event.target?.closest?.('[data-open-profile]');
        if (openButton) {
          const profileId = openButton.closest('[data-profile-id]')?.dataset.profileId;
          if (!profileId) return;
          openButton.disabled = true;
          setStatus('Opening profile…', 'testing');
          try {
            const result = await freedomAPI.openProfile?.(profileId);
            if (!result?.success) {
              throw new Error(result?.error?.message || 'Profile could not be opened');
            }
            setStatus(
              `Opening ${result.profile?.displayName || profileId} in a new window…`,
              'success'
            );
          } catch (err) {
            setStatus(err?.message || 'Profile could not be opened', 'error');
            openButton.disabled = false;
          }
          return;
        }

        const renameButton = event.target?.closest?.('[data-rename-profile]');
        if (!renameButton) return;
        const row = renameButton.closest('[data-profile-id]');
        const profileId = row?.dataset.profileId;
        const input = row?.querySelector('[data-profile-name-input]');
        const displayName = input?.value.trim();
        if (!profileId || !displayName) {
          setStatus('Profile name cannot be empty.', 'error');
          return;
        }
        renameButton.disabled = true;
        setStatus('Saving profile name…', 'testing');
        try {
          const result = await freedomAPI.renameProfile?.(profileId, displayName);
          if (!result?.success) {
            throw new Error(result?.error?.message || 'Profile could not be renamed');
          }
          setStatus('Profile name saved.', 'success');
          await refreshProfiles();
        } catch (err) {
          setStatus(err?.message || 'Profile could not be renamed', 'error');
        } finally {
          renameButton.disabled = false;
        }
      });

      // Live-refresh when a profile is created (via the modal), renamed, or
      // deleted elsewhere — but don't clobber a field the user is editing.
      freedomAPI.onProfileUpdated?.(() => {
        const active = document.activeElement;
        if (active && managerList?.contains(active)) return;
        refreshProfiles();
      });

      refreshProfiles();
    </script>
  </body>
</html>
