name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run lint
        run: npm run lint

      - name: Run test coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: error

  # freedom-ipfs native addon smoke for every desktop addon target currently
  # published in the pinned prebuilt manifest. This downloads the real release
  # artifact, loads it in Node, starts native freedom-ipfs, and retrieves a real
  # IPNS page through the native request API.
  freedom-ipfs-native-addon:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: win32-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Assert shipped native-addon target
        run: node -e "const target = process.platform + '-' + process.arch; const expected = process.env.EXPECTED_TARGET; if (target !== expected) { console.error('Expected ' + expected + ' runner, got ' + target); process.exit(1); } console.log(target);"
        env:
          EXPECTED_TARGET: ${{ matrix.target }}

      - name: Download IPFS native addon
        run: npm run ipfs:download
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Smoke test IPFS native addon
        run: npm run ipfs:native:smoke
        env:
          FREEDOM_IPFS_NATIVE_SMOKE_TARGET: ${{ matrix.target }}
          FREEDOM_IPFS_NATIVE_SMOKE_PATH: /ipns/ipfs.tech/
          FREEDOM_IPFS_NATIVE_SMOKE_EXPECT: ipfs

      - name: Smoke test issue #102 high-fanout IPFS page
        if: matrix.target == 'linux-x64'
        run: npm run ipfs:native:smoke
        env:
          FREEDOM_IPFS_NATIVE_SMOKE_TARGET: ${{ matrix.target }}
          FREEDOM_IPFS_NATIVE_SMOKE_LIVE: '0'
          FREEDOM_IPFS_NATIVE_SMOKE_ISSUE_102: '1'

  # Issue #90 — Windows EPERM wiping bee-data/statestore during wallet creation.
  # Reproductions live in cross-platform Jest integration tests that spawn a
  # real Bee node; the Windows leg is what actually exercises the
  # EPERM-on-locked-handle behavior (raw wipe + the inject flow that must stop
  # Bee before wiping).
  bee-statestore-lock:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download Bee binary
        run: npm run bee:download
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run statestore-lock reproduction tests
        run: npx jest --forceExit --runInBand src/main/identity/__tests__/integration/bee-statestore-lock.test.js src/main/identity/__tests__/integration/bee-injection-stops-node.test.js

  # Issue #90 follow-up — onboarding wizard must create node identities while a
  # real Bee node is running (its locked statestore is what triggered the EPERM
  # wipe failure). Drives the full password wizard end-to-end against a real Bee
  # spawn; the Windows leg is the meaningful regression guard.
  e2e-onboarding-identity:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright system dependencies
        if: runner.os == 'Linux'
        run: npx playwright install-deps

      - name: Download Bee binary
        run: npm run bee:download
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Download IPFS native addon
        run: npm run ipfs:download
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run onboarding identity E2E
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a npm run test:e2e:onboarding
          else
            npm run test:e2e:onboarding
          fi

      - name: Upload Playwright traces and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-onboarding-identity-${{ matrix.os }}-traces
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  # Issue #69 — address-bar clipboard: Win/Linux menu wiring + chrome context menu (all platforms).
  e2e-address-bar-clipboard:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright system dependencies
        if: runner.os == 'Linux'
        run: npx playwright install-deps

      - name: Run address-bar clipboard E2E
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a npm run test:e2e -- test-e2e/address-bar-clipboard.spec.js
          else
            npm run test:e2e -- test-e2e/address-bar-clipboard.spec.js
          fi

      - name: Upload Playwright traces and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-address-bar-clipboard-${{ matrix.os }}-traces
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14
