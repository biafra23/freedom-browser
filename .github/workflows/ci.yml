name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run lint
        run: npm run lint

      - name: Run test coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: error

  # Onboarding wizard must create node identities while a real Swarm node (now
  # antd) is running. Drives the full password wizard end-to-end against a real
  # antd spawn across all three desktop platforms — the cross-platform proof
  # that the bundled Ant node starts, goes healthy, and accepts an injected
  # identity. (antd self-initializes its identity and reads the injected
  # keys/swarm.key; it has no LevelDB statestore, but the wizard's
  # stop→wipe→reinject→restart flow is still exercised.)
  e2e-onboarding-identity:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright system dependencies
        if: runner.os == 'Linux'
        run: npx playwright install-deps

      - name: Download Ant (antd) binary
        # Version pinned in scripts/fetch-ant.js so CI tests exactly what releases ship.
        run: npm run ant:download
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Download IPFS binary
        run: npm run ipfs:download
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run onboarding identity E2E
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a npm run test:e2e:onboarding
          else
            npm run test:e2e:onboarding
          fi

      - name: Upload Playwright traces and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-onboarding-identity-${{ matrix.os }}-traces
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  # Standalone Ant live E2E: prove the bundled antd node starts, connects to the
  # Swarm network (peer count climbs), and serves real content the browser
  # requests — `meinhard.eth` is a Swarm-hosted (bzz://) site. This is the
  # headless, real-network validation that Ant is a working bee drop-in for
  # downloads. Linux-only to keep CI cheap; the cross-platform spawn proof lives
  # in e2e-onboarding-identity above.
  e2e-ant:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright system dependencies
        run: npx playwright install-deps

      - name: Download Ant (antd) binary
        # Version pinned in scripts/fetch-ant.js so CI tests exactly what releases ship.
        run: npm run ant:download
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Download IPFS binary
        run: npm run ipfs:download
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # Upgrade-path proof: antd must adopt a migrated bee-era identity
      # (decrypt keys/swarm.key with the carried-over config password) instead
      # of self-generating a throwaway wallet. Skipped in the unit-test job
      # because it needs the real antd binary downloaded above.
      - name: Run bee-data → ant-data migration integration test
        run: npx jest --forceExit src/main/identity/__tests__/integration/bee-to-ant-migration.test.js

      - name: Run Ant live download E2E (headless)
        run: xvfb-run -a npm run test:e2e:live -- test-e2e/live/eth-sites.spec.js

      - name: Upload Playwright traces and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ant-traces
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  # Issue #69 — address-bar clipboard: Win/Linux menu wiring + chrome context menu (all platforms).
  e2e-address-bar-clipboard:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright system dependencies
        if: runner.os == 'Linux'
        run: npx playwright install-deps

      - name: Run address-bar clipboard E2E
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a npm run test:e2e -- test-e2e/address-bar-clipboard.spec.js
          else
            npm run test:e2e -- test-e2e/address-bar-clipboard.spec.js
          fi

      - name: Upload Playwright traces and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-address-bar-clipboard-${{ matrix.os }}-traces
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14
